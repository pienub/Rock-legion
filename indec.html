<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Legion</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b0b;
    color:white;
}

#chat {
    height: calc(100vh - 140px);
    overflow-y:auto;
    padding:10px;
}

.msg {
    background:#1f1f1f;
    margin:8px 0;
    padding:10px;
    border-radius:10px;
}

.system {
    text-align:center;
    color:gray;
    font-size:12px;
}

.reply {
    font-size:12px;
    color:#aaa;
    border-left:3px solid #555;
    padding-left:6px;
    margin-bottom:5px;
}

#bar {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    gap:5px;
    padding:8px;
    background:#111;
    box-sizing:border-box;
}

input, button {
    padding:10px;
    border:none;
    border-radius:8px;
}

input { flex:1; }

button { background:#2d6bff; color:white; }

img { max-width:200px; border-radius:10px; }
</style>
</head>

<body>

<div id="chat"></div>

<div id="bar">
    <input id="name" placeholder="Name">
    <input id="msg" placeholder="Message">
    <button onclick="send()">Send</button>

    <input type="file" id="img">
    <button onclick="sendImage()">📷</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const chat = document.getElementById("chat");

let replyTarget = null;

// JOIN (FIXED: ALWAYS WORKS)
document.getElementById("name").addEventListener("change", () => {
    socket.emit("join", name.value.trim());
});

// ENTER KEY
document.getElementById("msg").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});

// SEND MESSAGE
function send(){
    const msg = document.getElementById("msg").value;
    if(!msg) return;

    socket.emit("message", {
        text: msg,
        replyTo: replyTarget
    });

    replyTarget = null;
    document.getElementById("msg").value="";
}

// AUTO SCROLL
function scroll(){
    chat.scrollTop = chat.scrollHeight;
}

// MESSAGE
socket.on("message", d=>{
    const div = document.createElement("div");
    div.className="msg";

    let reply = "";
    if(d.replyTo){
        reply = `<div class="reply">Reply: ${d.replyTo}</div>`;
    }

    div.innerHTML = `
        ${reply}
        <b>${d.name}:</b><br>
        ${d.text}
        <button onclick="reply('${d.text.replace(/'/g,"")}')">↩</button>
    `;

    chat.appendChild(div);
    scroll();
});

// SYSTEM
socket.on("system", m=>{
    const div=document.createElement("div");
    div.className="system";
    div.innerText=m;
    chat.appendChild(div);
    scroll();
});

// IMAGE
socket.on("image", d=>{
    const div=document.createElement("div");
    div.className="msg";
    div.innerHTML=`<b>${d.name}</b><br><img src="${d.url}">`;
    chat.appendChild(div);
    scroll();
});

// REPLY
function reply(text){
    replyTarget = text;
    document.getElementById("msg").focus();
}

// IMAGE UPLOAD
function sendImage(){
    const file=document.getElementById("img").files[0];
    if(!file) return;

    const fd=new FormData();
    fd.append("image",file);

    fetch("/upload",{method:"POST",body:fd});
}
</script>

</body>
</html>
